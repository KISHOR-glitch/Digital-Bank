<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Compario AI – Price Finder</title>
  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding-top: 60px;
    }

    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 90%;
      max-width: 700px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    .upload-box {
      border: 2px dashed #aaa;
      border-radius: 10px;
      padding: 30px;
      background: #fafafa;
      margin-bottom: 20px;
    }

    button {
      margin-top: 10px;
      padding: 10px 25px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .lowest-banner {
      background: #27ae60;
      color: white;
      padding: 12px;
      border-radius: 10px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .product-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🛍 Compario AI – Upload Product Image</h2>
    <form id="uploadForm" enctype="multipart/form-data">
      <div class="upload-box">
        <input type="file" id="fileInput" name="image" required />
        <p id="fileName"></p>
      </div>
      <button type="submit">Analyze</button>
    </form>

    <div id="loader" style="display:none;">⏳ Scanning & fetching prices...</div>
    <div id="results" style="display:none;">
      <div id="lowestBanner" class="lowest-banner" style="display:none;"></div>
      <div id="productList"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById("uploadForm");
    const loader = document.getElementById("loader");
    const resultsDiv = document.getElementById("results");
    const productList = document.getElementById("productList");
    const lowestBanner = document.getElementById("lowestBanner");
    const fileInput = document.getElementById("fileInput");
    const fileName = document.getElementById("fileName");

    fileInput.addEventListener("change", () => fileName.textContent = fileInput.files[0]?.name || "");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData(form);
      loader.style.display = "block";
      resultsDiv.style.display = "none";

      const res = await fetch("/upload", { method: "POST", body: formData });
      const data = await res.json();
      loader.style.display = "none";
      resultsDiv.style.display = "block";

      productList.innerHTML = "";
      if (!data.matches || data.matches.length === 0) {
        productList.innerHTML = "<p>No products found.</p>";
        return;
      }

      if (data.lowest_price) {
        lowestBanner.style.display = "block";
        lowestBanner.innerHTML = `🏷️ Best Deal: ${data.lowest_price.Price} on ${data.lowest_price.Platform} 
        <a href="${data.lowest_price['Product Link']}" target="_blank">Buy Now</a>`;
      }

      data.matches.forEach(item => {
        const card = document.createElement("div");
        card.className = "product-card";
        card.innerHTML = `<strong>${item.Title}</strong><br>
        Platform: ${item.Platform}<br>
        Price: ${item.Price}<br>
        <a href="${item['Product Link']}" target="_blank">View →</a>`;
        productList.appendChild(card);
      });
    });
  </script>
</body>
</html>
